apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: chat-backend-ddd:latest
          imagePullPolicy: Never
          env:
            - name: APP_ENV
              value: "production"
            - name: ALLOWED_ORIGIN
              value: "http://localhost:3000"
            - name: LOGIN_RATE_LIMIT_IP_MAX_ATTEMPTS
              value: "99999"
            - name: LOGIN_RATE_LIMIT_USER_MAX_ATTEMPTS
              value: "99999"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SECRET_KEY
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ADMIN_PASSWORD
            - name: ADMIN_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ADMIN_SECRET_KEY
            - name: USERS
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: USERS
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  type: LoadBalancer
  selector:
    app: backend
  ports:
    - port: 8000
